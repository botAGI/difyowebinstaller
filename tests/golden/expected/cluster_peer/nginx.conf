worker_processes auto;
worker_rlimit_nofile 65535;

events {
    worker_connections 4096;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout 300;
    proxy_socket_keepalive on;
    types_hash_max_size 2048;

    client_max_body_size 500M;

    # Gzip compression
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml;

    # --- Security Headers (applied globally) ---
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;

    # Hide nginx version
    server_tokens off;

    # --- Rate Limiting ---
    limit_req_zone $binary_remote_addr zone=api:10m rate=10r/s;
    limit_req_zone $binary_remote_addr zone=login:10m rate=6r/m;
    limit_req_zone $binary_remote_addr zone=health:1m rate=1r/s;
    limit_conn_zone $binary_remote_addr zone=ws:10m;

    # Logging
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" "$http_x_forwarded_for"';
    access_log /var/log/nginx/access.log main;
    error_log /var/log/nginx/error.log warn;

    # Plugin Daemon resolved dynamically (allows nginx to start even if daemon is down)
    resolver 127.0.0.11 valid=10s;

    # --- HTTP server ---
    server {
        listen 80;
        server_name _;

        # Certbot challenge (must be BEFORE redirect to allow ACME verification)
        location /.well-known/acme-challenge/ {
            root /var/www/certbot;
        }


        # =============================================
        # Health endpoint — static JSON, no auth, rate limited
        # Per user decision: /health bypasses Authelia (05-CONTEXT.md)
        # =============================================
        location = /health {
            default_type application/json;
            add_header Cache-Control "no-cache, no-store, must-revalidate" always;
            add_header X-Content-Type-Options "nosniff" always;
            limit_req zone=health burst=5 nodelay;
            alias /etc/nginx/health/health.json;
        }

        # =============================================
        # Nginx stub_status — scraped by nginx-prometheus-exporter (Phase 38)
        # Restricted to docker backend subnet; blocked from everywhere else.
        # =============================================
        location = /stub_status {
            stub_status;
            access_log off;
            allow 127.0.0.1;
            allow 172.16.0.0/12;
            deny all;
        }

        # =============================================
        # Dify App — default frontend (/)
        # =============================================
        location / {
            set $u_dify_web http://web:3000;
            proxy_pass $u_dify_web;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            # Prevent stale page cache (mDNS reconnect shows fresh content)
            add_header Cache-Control "no-store, no-cache, must-revalidate" always;
            add_header Pragma "no-cache" always;
        }

        # Dify Console Login — tighter rate limit
        location /console/api/login {
            limit_req zone=login burst=3 nodelay;
            set $u_dify_api http://api:5001;
            proxy_pass $u_dify_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
        }

        # Dify Console API (SSE streaming for chat)
        location /console/api {
            limit_req zone=api burst=20 nodelay;
            set $u_dify_api http://api:5001;
            proxy_pass $u_dify_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # Dify API (SSE streaming for chat)
        location /api {
            limit_req zone=api burst=20 nodelay;
            set $u_dify_api http://api:5001;
            proxy_pass $u_dify_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # Dify Service API (/v1) — SSE streaming
        location /v1 {
            limit_req zone=api burst=20 nodelay;
            set $u_dify_api http://api:5001;
            proxy_pass $u_dify_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_read_timeout 3600s;
            proxy_send_timeout 3600s;
            proxy_buffering off;
            chunked_transfer_encoding on;
        }

        # Dify Files
        location /files {
            limit_req zone=api burst=20 nodelay;
            set $u_dify_api http://api:5001;
            proxy_pass $u_dify_api;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }

        # Plugin Daemon (dynamic resolve — nginx starts even if daemon is down)
        location /e/ {
            set $plugin_upstream http://plugin_daemon:5002;
            proxy_pass $plugin_upstream;
            proxy_http_version 1.1;
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            proxy_connect_timeout 600s;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
        }


        # =============================================
        # Block old-style hex token URLs (security)
        # =============================================
        location ~ "^/[a-f0-9]{24,}/" {
            return 404;
        }
    }

    # =============================================
    # LiteLLM Dashboard — separate port (Next.js SPA
    # incompatible with sub-path reverse proxy)
    # =============================================
    server {
        listen 4001;
        server_name _;
    
        location / {
            set $u_litellm http://litellm:4000;
            proxy_pass $u_litellm/;
            proxy_http_version 1.1;
            proxy_set_header Host $host:$server_port;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }






    # =============================================
    # Virtual hosts — local DNS names on port 80
    # Each service gets a clean root / via hostname
    # =============================================






    # LiteLLM — agmind-litellm.local (port 80)
    server {
        listen 80;
        server_name agmind-litellm.local;
    
        location / {
            set $u_litellm_local http://litellm:4000;
            proxy_pass $u_litellm_local;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
        }
    }

    # MinIO — agmind-storage.local (port 80 -> minio console 9001)
    server {
        listen 80;
        server_name agmind-storage.local;
    
        client_max_body_size 5G;  # MinIO uploads
    
        # Console UI (port 9001 inside container)
        location / {
            set $u_minio_console http://minio:9001;
            proxy_pass $u_minio_console;
            proxy_http_version 1.1;
            proxy_set_header Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade $http_upgrade;
            proxy_set_header Connection "upgrade";
            proxy_read_timeout 600s;
            proxy_send_timeout 600s;
            chunked_transfer_encoding off;
        }
    }


    # =============================================
    # Dify Console — agmind-dify.local (port 80)
    # =============================================
    server {
        listen 80;
        server_name agmind-dify.local;

        client_max_body_size 500M;

        # --- Health endpoint (shared JSON, see phase 36) ---
        location = /health {
