    }

    # =============================================
    # Dify Console — legacy port 3000 (backward compat)
    # =============================================
    server {
        listen 3000;
        server_name _;

        client_max_body_size 500M;


        # Dify Console Web UI (root — Next.js works natively)
        location / {
            set $u_dify_web http://web:3000;
