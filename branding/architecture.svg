<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 960 720" font-family="Inter, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117"/>
      <stop offset="100%" style="stop-color:#161b22"/>
    </linearGradient>
    <linearGradient id="nginxGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#e94560"/>
      <stop offset="100%" style="stop-color:#c23152"/>
    </linearGradient>
    <linearGradient id="gpuGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#76b900"/>
      <stop offset="100%" style="stop-color:#5a8f00"/>
    </linearGradient>
    <linearGradient id="dataGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#0078d4"/>
      <stop offset="100%" style="stop-color:#005a9e"/>
    </linearGradient>
    <linearGradient id="optGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#8b5cf6"/>
      <stop offset="100%" style="stop-color:#6d28d9"/>
    </linearGradient>
    <linearGradient id="monGrad" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" style="stop-color:#f59e0b"/>
      <stop offset="100%" style="stop-color:#d97706"/>
    </linearGradient>
    <filter id="shadow">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-opacity="0.3"/>
    </filter>
  </defs>

  <!-- Background -->
  <rect width="960" height="720" fill="url(#bgGrad)" rx="12"/>

  <!-- Title -->
  <text x="480" y="36" text-anchor="middle" fill="#e6edf3" font-size="18" font-weight="700">AGMind Architecture</text>

  <!-- ===== NGINX LAYER ===== -->
  <rect x="40" y="52" width="880" height="90" rx="8" fill="none" stroke="#e94560" stroke-width="2" opacity="0.9" filter="url(#shadow)"/>
  <rect x="40" y="52" width="880" height="24" rx="8" fill="url(#nginxGrad)" opacity="0.9"/>
  <rect x="40" y="68" width="880" height="8" fill="url(#nginxGrad)" opacity="0.9"/>
  <text x="480" y="68" text-anchor="middle" fill="#fff" font-size="12" font-weight="600">NGINX REVERSE PROXY  :80 / :443 / :3000</text>

  <!-- Nginx items -->
  <rect x="60" y="86" width="170" height="44" rx="6" fill="#1c2333" stroke="#e94560" stroke-width="1"/>
  <text x="145" y="104" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Dify App</text>
  <text x="145" y="120" text-anchor="middle" fill="#8b949e" font-size="10">/ (default)</text>

  <rect x="250" y="86" width="170" height="44" rx="6" fill="#1c2333" stroke="#e94560" stroke-width="1"/>
  <text x="335" y="104" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Dify API</text>
  <text x="335" y="120" text-anchor="middle" fill="#8b949e" font-size="10">/api /v1 /console /files</text>

  <rect x="440" y="86" width="170" height="44" rx="6" fill="#1c2333" stroke="#e94560" stroke-width="1"/>
  <text x="525" y="104" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">Dify Console</text>
  <text x="525" y="120" text-anchor="middle" fill="#8b949e" font-size="10">:3000</text>

  <rect x="630" y="86" width="170" height="44" rx="6" fill="#1c2333" stroke="#e94560" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="715" y="104" text-anchor="middle" fill="#8b949e" font-size="11" font-weight="600">Open WebUI</text>
