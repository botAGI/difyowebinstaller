  <rect x="423" y="454" width="82" height="64" rx="6" fill="#1c2333" stroke="#8b5cf6" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="464" y="476" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">Crawl4AI</text>
