  <text x="102" y="242" text-anchor="middle" fill="#8b949e" font-size="9">:11434</text>
  <text x="102" y="256" text-anchor="middle" fill="#76b900" font-size="9">LLM (GPU)</text>

  <rect x="162" y="204" width="95" height="64" rx="6" fill="#1c2333" stroke="#76b900" stroke-width="1"/>
  <text x="209" y="226" text-anchor="middle" fill="#e6edf3" font-size="11" font-weight="600">vLLM</text>
  <text x="209" y="242" text-anchor="middle" fill="#8b949e" font-size="9">:8000</text>
  <text x="209" y="256" text-anchor="middle" fill="#76b900" font-size="9">LLM (GPU)</text>

  <rect x="269" y="204" width="95" height="64" rx="6" fill="#1c2333" stroke="#76b900" stroke-width="1"/>
  <text x="316" y="222" text-anchor="middle" fill="#e6edf3" font-size="10" font-weight="600">TEI / vLLM</text>
