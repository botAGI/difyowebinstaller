# Pre-commit hooks — local guard ДО `git commit`.
# Setup один раз на машине разработчика:
#   pip install pre-commit && pre-commit install
#
# Затем каждый commit автоматически прогоняет всё ниже за <1 секунду.
# Поймает 80% мусора до push (синтаксис bash, secrets в diff, broken YAML,
# trailing whitespace, etc) — не надо ждать 2 минуты CI чтобы исправлять очевидное.
#
# Совпадает с тем что прогоняется в CI (.github/workflows/test.yml) —
# pre-commit это просто "shift left" — те же проверки, но локально.

repos:
  # --- Standard pre-commit hooks (бесплатные win'ы) ---
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v6.0.0
    hooks:
      - id: trailing-whitespace
        exclude: '\.md$'  # markdown часто использует trailing-whitespace для line break
      - id: end-of-file-fixer
      - id: check-yaml
        args: ['--unsafe']  # docker-compose уses !reset/!override custom tags
        exclude: '^\.gitlab-ci\.yml$'  # not used
      - id: check-added-large-files
        args: ['--maxkb=1024']  # 1MB cap — fixtures могут быть до этого размера
      - id: check-merge-conflict
      - id: check-executable-has-shebang
      - id: check-shebang-scripts-are-executable
      - id: detect-private-key
      - id: mixed-line-ending
        args: ['--fix=lf']
      - id: check-case-conflict

  # --- Bash quality (соответствует tests/run_all.sh shellcheck gate) ---
  - repo: https://github.com/shellcheck-py/shellcheck-py
    rev: v0.11.0.1
    hooks:
      - id: shellcheck
        args: ['-S', 'warning']
        # tests/mocks/ — exec'и без shebang (mock binaries), shellcheck not applicable
        exclude: '^tests/mocks/'

  # --- YAML stylistic + structural ---
  - repo: https://github.com/adrienverge/yamllint
    rev: v1.37.1
    hooks:
      - id: yamllint
        args:
          - '-d'
          - |
            {extends: default, rules: {
              line-length: {max: 200, level: warning},
              indentation: {indent-sequences: consistent},
              comments: {min-spaces-from-content: 1},
              comments-indentation: disable,
              truthy: {check-keys: false},
              document-start: disable,
              brackets: disable
            }}

  # --- Secrets scanning (предотвращает credential leak в commit) ---
  # gitleaks: дёшево, быстро, MIT. Если ловит false-positive — добавить в .gitleaksignore.
  - repo: https://github.com/gitleaks/gitleaks
    rev: v8.30.0
    hooks:
      - id: gitleaks

  # --- Markdown sanity (для README + docs/) ---
  - repo: https://github.com/igorshubovych/markdownlint-cli
    rev: v0.45.0
    hooks:
      - id: markdownlint
        args:
          - '--disable=MD013'  # line length — RU тексты длинные, не enforcement
          - '--disable=MD033'  # inline HTML — мы используем для badge layout
          - '--disable=MD041'  # first line h1 — не везде нужно
        exclude: '^(\.github|node_modules|\.planning)'

  # --- Phase 13 additions ---
  - repo: local
    hooks:
      # D-15: commit-msg trailer required when staged diff touches
      # tests/golden/expected/**. Wraps the standalone bash guard shipped by
      # Plan 13-04 (tests/golden/_commit_msg_guard.sh) so pre-commit and
      # CI share the same enforcement script.
      - id: golden-update-guard
        name: Require golden-accept-reason trailer when tests/golden/expected/ changes
        entry: bash tests/golden/_commit_msg_guard.sh
        language: system
        stages: [commit-msg]

      # D-16: ASCII-only bash enforcement. Installed in stages: [manual] (opt-in)
      # because the codebase historically contains non-ASCII bytes in bash source:
      # RU comments per CLAUDE.md §1 (response_language=RU is project policy) and
      # UI glyphs (logger arrows like '->', section markers like '#') that are
      # intentional UX. Running the hook on the default pre-commit stage today
      # would block every commit until lib/*, scripts/*, install.sh, and the
      # existing tests/golden + tests/lint helpers are bulk-purged of those
      # bytes — out of scope for Plan 13-05 (TEST-09 ships the gate, not the
      # purge). Opt-in invocation:
      #
      #     pre-commit run --hook-stage manual ascii-only-bash
      #
      # Phase 14 cleanup pass (or a dedicated future plan) can flip stages to
      # [pre-commit] once the offenders are normalized. See 13-05-SUMMARY.md
      # "Deviations from Plan" for the architectural rationale (Rule 4).
      - id: ascii-only-bash
        name: Forbid non-ASCII bytes in bash source files (opt-in / manual)
        entry: bash -c 'LC_ALL=C grep -l "[^[:print:][:space:]]" "$@" && exit 1 || exit 0' --
        language: system
        stages: [manual]
        types: [shell]
        files: '^(lib/|scripts/|install\.sh|tests/golden/run\.sh)'

      # DOCS-03: regenerate docs/adr/INDEX.md table between sentinel markers
      # when any ADR markdown file is staged. The hook runs the generator in
      # --pre-commit mode: if INDEX.md changes, the hook auto-stages it and
      # exits 1 with a re-commit message so the operator reviews the diff
      # before it lands. INDEX.md edits do NOT re-trigger the hook
      # (files regex matches only docs/adr/NNNN-*.md), avoiding recursion.
      - id: adr-index
        name: Regenerate docs/adr/INDEX.md when ADR files change
        entry: bash -c 'python3 scripts/generate-adr-index.py && if ! git diff --quiet docs/adr/INDEX.md; then git add docs/adr/INDEX.md; echo "INDEX.md regenerated, please review and re-commit."; exit 1; fi'
        language: system
        files: '^docs/adr/[0-9]{4}-.*\.md$'
        pass_filenames: false
