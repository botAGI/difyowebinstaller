# AGMind Alertmanager Configuration
#
# Default state: receiver 'default' is EMPTY — no alerts leave the stack.
# This is deliberate: the vendor must not know about customer incidents.
# Activate one (or more) channel via wizard / install.sh:
#   ALERT_MODE=telegram  — customer creates their own bot via @BotFather
#   ALERT_MODE=email     — customer's own SMTP server
#   ALERT_MODE=webhook   — generic HTTPS webhook (Slack, Teams, Mattermost, Zabbix...)
# Alerts still visible in Grafana (AGmind Alerts dashboard) and AM UI regardless.

global:
  resolve_timeout: 5m
  smtp_hello: agmind.local

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'default'
      repeat_interval: 15m
    - match:
        severity: warning
      receiver: 'default'
      repeat_interval: 4h

receivers:
  - name: 'default'
    # Phase 37: native Telegram receiver (Alertmanager >= 0.24.0).
    # Activated when ALERT_TELEGRAM_TOKEN + ALERT_TELEGRAM_CHAT_ID are set —
    # install.sh strips #__ALERT_TELEGRAM__ marker and substitutes values.
    #__ALERT_TELEGRAM__telegram_configs:
    #__ALERT_TELEGRAM__  - bot_token: '__ALERT_TELEGRAM_TOKEN__'
    #__ALERT_TELEGRAM__    chat_id: __ALERT_TELEGRAM_CHAT_ID__
    #__ALERT_TELEGRAM__    parse_mode: 'HTML'
    #__ALERT_TELEGRAM__    send_resolved: true
    #__ALERT_TELEGRAM__    message: |
    #__ALERT_TELEGRAM__      <b>{{ .Status | toUpper }}</b> — {{ .CommonLabels.alertname }}
    #__ALERT_TELEGRAM__      <b>Severity:</b> {{ .CommonLabels.severity }}
    #__ALERT_TELEGRAM__      <b>Container:</b> {{ .CommonLabels.name }}
    #__ALERT_TELEGRAM__      {{ range .Alerts }}
    #__ALERT_TELEGRAM__      <i>{{ .Annotations.summary }}</i>
    #__ALERT_TELEGRAM__      {{ .Annotations.description }}
    #__ALERT_TELEGRAM__      {{ end }}
    #
    # Email receiver — activated when ALERT_MODE=email and ALERT_EMAIL_* set.
    # Customer supplies their SMTP host + credentials + from/to addresses.
    #__ALERT_EMAIL__email_configs:
    #__ALERT_EMAIL__  - to: '__ALERT_EMAIL_TO__'
    #__ALERT_EMAIL__    from: '__ALERT_EMAIL_FROM__'
    #__ALERT_EMAIL__    smarthost: '__ALERT_EMAIL_SMARTHOST__'
    #__ALERT_EMAIL__    auth_username: '__ALERT_EMAIL_AUTH_USER__'
    #__ALERT_EMAIL__    auth_password: '__ALERT_EMAIL_AUTH_PASS__'
    #__ALERT_EMAIL__    require_tls: true
    #__ALERT_EMAIL__    send_resolved: true
    #
    # Generic webhook — Slack / Teams / Mattermost / Zabbix / custom.
    # Activated when ALERT_MODE=webhook and ALERT_WEBHOOK_URL set.
    # Mutually compatible with telegram and email (all three can be enabled).
    #__WEBHOOK__webhook_configs:
    #__WEBHOOK__  - url: '__ALERT_WEBHOOK_URL__'
    #__WEBHOOK__    send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
