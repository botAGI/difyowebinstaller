# AGMind Alertmanager Configuration
# Receivers configured via environment variables at install time

global:
  resolve_timeout: 5m

route:
  group_by: ['alertname', 'severity']
  group_wait: 10s
  group_interval: 10s
  repeat_interval: 1h
  receiver: 'default'
  routes:
    - match:
        severity: critical
      receiver: 'default'
      repeat_interval: 15m
    - match:
        severity: warning
      receiver: 'default'
      repeat_interval: 4h

receivers:
  - name: 'default'
    # Webhook receiver (configured if ALERT_WEBHOOK_URL is set)
    #__WEBHOOK__webhook_configs:
    #__WEBHOOK__  - url: '__ALERT_WEBHOOK_URL__'
    #__WEBHOOK__    send_resolved: true

inhibit_rules:
  - source_match:
      severity: 'critical'
    target_match:
      severity: 'warning'
    equal: ['alertname']
