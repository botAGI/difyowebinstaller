groups:
  - name: agmind_container_alerts
    rules:
      # Container down for >2 minutes
      - alert: ContainerDown
        expr: time() - container_last_seen{name=~"agmind-.*"} > 120
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} is down"
          description: "Container {{ $labels.name }} has been down for more than 2 minutes."

      # Container restart loop (>3 restarts in 15 min)
      - alert: ContainerRestartLoop
        expr: changes(container_start_time_seconds{name=~"agmind-.*"}[15m]) > 3
        for: 0m
        labels:
          severity: critical
        annotations:
          summary: "Container {{ $labels.name }} is in restart loop"
          description: "Container {{ $labels.name }} has restarted {{ $value }} times in the last 15 minutes."

      # High CPU usage (>90% for 5 min)
      - alert: HighCpuUsage
        expr: rate(container_cpu_usage_seconds_total{name=~"agmind-.*"}[5m]) * 100 > 90
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High CPU usage on {{ $labels.name }}"
          description: "Container {{ $labels.name }} CPU usage is {{ $value | humanize }}%."

      # High memory usage (>85%)
      - alert: HighMemoryUsage
        expr: (container_memory_usage_bytes{name=~"agmind-.*"} / container_spec_memory_limit_bytes{name=~"agmind-.*"}) * 100 > 90 and container_spec_memory_limit_bytes{name=~"agmind-.*"} > 0
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "High memory usage on {{ $labels.name }}"
          description: "Container {{ $labels.name }} memory usage is {{ $value | humanize }}%."

  - name: agmind_host_alerts
    rules:
      # Disk space low (<15%)
      - alert: DiskSpaceLow
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 15
        for: 5m
        labels:
          severity: warning
        annotations:
          summary: "Low disk space"
          description: "Root filesystem has only {{ $value | humanize }}% free space."

      # Disk space critical (<5%)
      - alert: DiskSpaceCritical
        expr: (node_filesystem_avail_bytes{mountpoint="/"} / node_filesystem_size_bytes{mountpoint="/"}) * 100 < 5
        for: 2m
        labels:
          severity: critical
        annotations:
          summary: "Critical disk space"
          description: "Root filesystem has only {{ $value | humanize }}% free space. Immediate action required."

