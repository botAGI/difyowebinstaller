# AGmind — Example RAG Q&A workflow (Dify 1.13+ DSL)
#
# Minimal starter: chat app with system prompt tuned for RAG + citations.
# Import via Dify Studio → Create App → Import DSL from File, or:
#   agmind dify import-workflow templates/dify-workflows/example-rag-qa.yaml
#
# After import, bind one or more Knowledge Bases via UI:
#   App → Orchestrate → Context → Add Dataset
#
# Intentionally minimal — replace prompts / add retrieval nodes to
# taste. For production-grade templates (legal, HR, finance, scan-PDF),
# see private stash .planning/private-stash/dify-workflows/ (not in git).

app:
  description: "Generic RAG Q&A assistant with inline citations. Replace system prompt and bind KB via UI."
  icon: "📚"
  icon_background: "#E4FBCC"
  mode: "chat"
  name: "AGmind RAG Starter"

kind: app
version: "0.1.5"

model_config:
  model:
    provider: "openai_api_compatible"
    name: "_REPLACE_WITH_YOUR_MODEL_"
    mode: "chat"
    completion_params:
      temperature: 0.3
      max_tokens: 1000
      top_p: 0.9
  pre_prompt: |
    Ты — ассистент AGmind, отвечаешь строго на основе контекста из базы знаний.

    Правила:
    - Если ответ не следует из контекста — скажи "Не нашёл в базе знаний".
    - Не выдумывай факты.
    - Отвечай на языке вопроса.
    - После каждого утверждения, взятого из контекста, ставь источник
      в квадратных скобках: [Источник: {название документа}].

    Контекст:
    {{#context#}}
  prompt_type: "simple"

  agent_mode:
    enabled: false
    tools: []

  dataset_configs:
    retrieval_model: "multiple"
    datasets:
      datasets: []  # Bind via UI — App → Orchestrate → Context
    top_k: 5
    score_threshold: 0.5
    reranking_enable: false

  file_upload:
    image:
      enabled: false

  retriever_resource:
    enabled: true   # Phase 45: Citations and Attributions ON

  speech_to_text:
    enabled: false

  text_to_speech:
    enabled: false

  opening_statement: "Здравствуйте! Я ассистент AGmind. Спросите меня что-нибудь по загруженным документам."
  suggested_questions: []
  suggested_questions_after_answer:
    enabled: false

  more_like_this:
    enabled: false

  sensitive_word_avoidance:
    enabled: false
    type: ""
    configs: []

  annotation_reply:
    enabled: false
