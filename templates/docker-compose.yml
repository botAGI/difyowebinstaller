x-security-defaults: &security-defaults
  dns:
    - 8.8.8.8
    - 1.1.1.1
  cap_drop:
    - AUDIT_CONTROL
    - AUDIT_READ
    - AUDIT_WRITE
    - BLOCK_SUSPEND
    - BPF
    - CHECKPOINT_RESTORE
    - DAC_READ_SEARCH
    - FSETID
    - IPC_LOCK
    - IPC_OWNER
    - KILL
    - LEASE
    - LINUX_IMMUTABLE
    - MAC_ADMIN
    - MAC_OVERRIDE
    - MKNOD
    - NET_ADMIN
    - NET_BROADCAST
    - PERFMON
    - SYS_BOOT
    - SYS_MODULE
    - SYS_NICE
    - SYS_PACCT
    - SYS_PTRACE
    - SYS_RAWIO
    - SYS_RESOURCE
    - SYS_TIME
    - SYS_TTY_CONFIG
    - SYSLOG
    - WAKE_ALARM
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "5"

x-shared-env: &shared-env
  # --- Core ---
  SECRET_KEY: ${SECRET_KEY:-}
  LOG_LEVEL: ${LOG_LEVEL:-INFO}
  EDITION: SELF_HOSTED
  DEPLOY_ENV: ${DEPLOY_ENV:-PRODUCTION}
  CONSOLE_WEB_URL: ${CONSOLE_WEB_URL:-}
  CONSOLE_API_URL: ${CONSOLE_API_URL:-}
  SERVICE_API_URL: ${SERVICE_API_URL:-}
  APP_API_URL: ${APP_API_URL:-}
  APP_WEB_URL: ${APP_WEB_URL:-}
  FILES_URL: ${FILES_URL:-}
  FILES_ACCESS_TIMEOUT: ${FILES_ACCESS_TIMEOUT:-300}
  MIGRATION_ENABLED: ${MIGRATION_ENABLED:-true}
  # --- Init admin ---
  INIT_PASSWORD: ${INIT_PASSWORD:-}
  # --- Database ---
  DB_USERNAME: ${DB_USERNAME:-postgres}
  DB_PASSWORD: ${DB_PASSWORD:-}
  DB_HOST: ${DB_HOST:-db}
  DB_PORT: ${DB_PORT:-5432}
  DB_DATABASE: ${DB_DATABASE:-dify}
  SQLALCHEMY_POOL_SIZE: ${SQLALCHEMY_POOL_SIZE:-30}
  SQLALCHEMY_POOL_RECYCLE: ${SQLALCHEMY_POOL_RECYCLE:-3600}
  SQLALCHEMY_ECHO: ${SQLALCHEMY_ECHO:-false}
  # --- Redis ---
  REDIS_HOST: ${REDIS_HOST:-redis}
  REDIS_PORT: ${REDIS_PORT:-6379}
  REDIS_PASSWORD: ${REDIS_PASSWORD:-}
  REDIS_DB: ${REDIS_DB:-0}
  REDIS_USE_SSL: ${REDIS_USE_SSL:-false}
  CELERY_BROKER_URL: redis://:${REDIS_PASSWORD:-}@${REDIS_HOST:-redis}:${REDIS_PORT:-6379}/1
  BROKER_USE_SSL: ${BROKER_USE_SSL:-false}
  # --- Storage ---
  STORAGE_TYPE: ${STORAGE_TYPE:-local}
  STORAGE_LOCAL_PATH: /app/api/storage
  # --- Vector Store ---
  VECTOR_STORE: ${VECTOR_STORE:-weaviate}
  WEAVIATE_ENDPOINT: ${WEAVIATE_ENDPOINT:-http://weaviate:8080}
  WEAVIATE_API_KEY: ${WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih}
  QDRANT_HOST: ${QDRANT_HOST:-qdrant}
  QDRANT_PORT: ${QDRANT_PORT:-6333}
  QDRANT_API_KEY: ${QDRANT_API_KEY:-}
  # --- Mail (disabled) ---
  MAIL_TYPE: ${MAIL_TYPE:-}
  MAIL_DEFAULT_SEND_FROM: ${MAIL_DEFAULT_SEND_FROM:-}
  # --- SSRF ---
  SSRF_PROXY_HTTP_URL: ${SSRF_PROXY_HTTP_URL:-http://ssrf_proxy:3128}
  SSRF_PROXY_HTTPS_URL: ${SSRF_PROXY_HTTPS_URL:-http://ssrf_proxy:3128}
  # --- Sandbox ---
  CODE_EXECUTION_ENDPOINT: ${CODE_EXECUTION_ENDPOINT:-http://sandbox:8194}
  CODE_EXECUTION_API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
  CODE_MAX_NUMBER: ${CODE_MAX_NUMBER:-9223372036854775807}
  CODE_MIN_NUMBER: ${CODE_MIN_NUMBER:--9223372036854775808}
  CODE_MAX_DEPTH: ${CODE_MAX_DEPTH:-5}
  CODE_MAX_PRECISION: ${CODE_MAX_PRECISION:-20}
  CODE_MAX_STRING_LENGTH: ${CODE_MAX_STRING_LENGTH:-80000}
  CODE_MAX_STRING_ARRAY_LENGTH: ${CODE_MAX_STRING_ARRAY_LENGTH:-30}
  CODE_MAX_OBJECT_ARRAY_LENGTH: ${CODE_MAX_OBJECT_ARRAY_LENGTH:-30}
  CODE_MAX_NUMBER_ARRAY_LENGTH: ${CODE_MAX_NUMBER_ARRAY_LENGTH:-1000}
  TEMPLATE_TRANSFORM_MAX_LENGTH: ${TEMPLATE_TRANSFORM_MAX_LENGTH:-80000}
  # --- Indexing ---
  INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH: ${INDEXING_MAX_SEGMENTATION_TOKENS_LENGTH:-4000}
  # --- ETL ---
  ETL_TYPE: ${ETL_TYPE:-dify}
  UNSTRUCTURED_API_URL: ${UNSTRUCTURED_API_URL:-}
  # --- Marketplace ---
  MARKETPLACE_ENABLED: ${MARKETPLACE_ENABLED:-true}
  CHECK_UPDATE_URL: ${CHECK_UPDATE_URL:-https://updates.dify.ai}
  # --- Plugin Daemon ---
  PLUGIN_API_URL: ${PLUGIN_API_URL:-http://plugin_daemon:5002}
  PLUGIN_API_KEY: ${PLUGIN_DAEMON_KEY:-}
  INNER_API_KEY_FOR_PLUGIN: ${PLUGIN_INNER_API_KEY:-}
  # --- Ollama ---
  OLLAMA_API_BASE: ${OLLAMA_API_BASE:-http://ollama:11434}

services:
  # ==================== Dify API ====================
  api:
    <<: *security-defaults
    image: langgenius/dify-api:${DIFY_VERSION:-1.13.0}
    container_name: agmind-api
    restart: always
    environment:
      <<: *shared-env
      MODE: api
    volumes:
      - ./volumes/app/storage:/app/api/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5001/health 2>/dev/null || wget -qO- http://localhost:5001/health 2>/dev/null || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 60s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
      sandbox:
        condition: service_healthy
    networks:
      - agmind-backend
      - ssrf-network

  # ==================== Dify Worker ====================
  worker:
    <<: *security-defaults
    image: langgenius/dify-api:${DIFY_VERSION:-1.13.0}
    container_name: agmind-worker
    restart: always
    environment:
      <<: *shared-env
      MODE: worker
    volumes:
      - ./volumes/app/storage:/app/api/storage
    healthcheck:
      test: ["CMD-SHELL", "celery -A app.celery inspect ping -d celery@$$HOSTNAME 2>/dev/null || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 15s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 30s
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - agmind-backend
      - ssrf-network

  # ==================== Dify Web (Console UI) ====================
  web:
    <<: *security-defaults
    image: langgenius/dify-web:${DIFY_VERSION:-1.13.0}
    container_name: agmind-web
    restart: always
    environment:
      CONSOLE_API_URL: ${CONSOLE_API_URL:-}
      APP_API_URL: ${APP_API_URL:-}
      SENTRY_DSN: ${WEB_SENTRY_DSN:-}
      NEXT_TELEMETRY_DISABLED: ${NEXT_TELEMETRY_DISABLED:-1}
      # Next.js binds to container hostname by default, not 0.0.0.0.
      # Without this, healthcheck on localhost:3000 gets Connection refused.
      HOSTNAME: "0.0.0.0"
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://127.0.0.1:3000 || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 15s
    networks:
      - agmind-backend

  # ==================== Pipeline (OpenAI-compatible proxy to Dify) ====================
  pipeline:
    <<: *security-defaults
    build:
      context: ./pipeline
      dockerfile: Dockerfile
    container_name: agmind-pipeline
    restart: always
    expose:
      - "9099"
    environment:
      DIFY_BASE_URL: http://api:5001
      DIFY_API_KEY: ${DIFY_API_KEY:-}
    healthcheck:
      test: ["CMD", "python", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:9099/health')"]
      interval: 10s
      timeout: 5s
      retries: 5
    depends_on:
      api:
        condition: service_healthy
    networks:
      - agmind-backend

  # ==================== Open WebUI ====================
  # WARNING: Version pinned for white-label/re-branding compatibility.
  # Do NOT change to :main or :latest without verifying branding features still work.
  open-webui:
    <<: *security-defaults
    # WARNING: open-webui version pinned for white-label compatibility
    image: ghcr.io/open-webui/open-webui:${OPENWEBUI_VERSION:-v0.5.20}
    container_name: agmind-openwebui
    restart: always
    environment:
      - WEBUI_NAME=${COMPANY_NAME:-AGMind}
      - ENABLE_SIGNUP=${ENABLE_SIGNUP:-false}
      - ENABLE_LOGIN_FORM=true
      - DEFAULT_USER_ROLE=user
      - WEBUI_AUTH=true
      - OLLAMA_BASE_URL=http://ollama:11434
      - OPENAI_API_BASE_URLS=http://pipeline:9099/v1
      - OPENAI_API_KEYS=${DIFY_API_KEY:-sk-placeholder}
      - ENABLE_OLLAMA_API=${ENABLE_OLLAMA_API:-false}
      - ENABLE_OPENAI_API=true
    volumes:
      - openwebui_data:/app/backend/data
    healthcheck:
      test: ["CMD-SHELL", "unset http_proxy https_proxy HTTP_PROXY HTTPS_PROXY && curl -sf http://localhost:8080/health 2>/dev/null || wget -qO- http://localhost:8080/health 2>/dev/null || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 30s
    depends_on:
      pipeline:
        condition: service_healthy
      ollama:
        condition: service_healthy
    networks:
      - agmind-backend

  # ==================== Ollama ====================
  ollama:
    <<: *security-defaults
    image: ollama/ollama:${OLLAMA_VERSION:-0.6.2}
    container_name: agmind-ollama
    restart: always
    cap_add:
      - SYS_ADMIN
    volumes:
      - ollama_data:/root/.ollama
    healthcheck:
      test: ["CMD", "ollama", "list"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 30s
    #__GPU__deploy:
    #__GPU__  resources:
    #__GPU__    reservations:
    #__GPU__      devices:
    #__GPU__        - driver: nvidia
    #__GPU__          count: all
    #__GPU__          capabilities: [gpu]
    networks:
      - agmind-backend

  # ==================== PostgreSQL ====================
  db:
    <<: *security-defaults
    image: postgres:${POSTGRES_VERSION:-15.10-alpine}
    container_name: agmind-db
    restart: always
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
      - FOWNER
    environment:
      PGUSER: ${DB_USERNAME:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-}
      POSTGRES_DB: ${DB_DATABASE:-dify}
      PGDATA: /var/lib/postgresql/data/pgdata
    command: >
      postgres -c 'max_connections=128'
               -c 'shared_buffers=256MB'
               -c 'work_mem=16MB'
               -c 'maintenance_work_mem=128MB'
               -c 'effective_cache_size=512MB'
               -c 'password_encryption=scram-sha-256'
               -c 'log_connections=on'
               -c 'log_disconnections=on'
               -c 'log_statement=ddl'
               -c 'log_min_duration_statement=1000'
    volumes:
      - ./volumes/db/data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "-U", "${DB_USERNAME:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agmind-backend

  # ==================== Redis ====================
  redis:
    <<: *security-defaults
    image: redis:${REDIS_VERSION:-7.4.1-alpine}
    container_name: agmind-redis
    restart: always
    read_only: true
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - DAC_OVERRIDE
    tmpfs:
      - /tmp
    command: redis-server /etc/redis/redis.conf
    volumes:
      - ./volumes/redis/data:/data
      - ./volumes/redis/redis.conf:/etc/redis/redis.conf:ro
    healthcheck:
      test: ["CMD", "redis-cli", "-a", "${REDIS_PASSWORD:-}", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - agmind-backend

  # ==================== Weaviate ====================
  weaviate:
    <<: *security-defaults
    image: semitechnologies/weaviate:${WEAVIATE_VERSION:-1.27.6}
    container_name: agmind-weaviate
    restart: always
    profiles:
      - weaviate
    environment:
      QUERY_DEFAULTS_LIMIT: 25
      AUTHENTICATION_ANONYMOUS_ACCESS_ENABLED: "false"
      AUTHENTICATION_APIKEY_ENABLED: "true"
      AUTHENTICATION_APIKEY_ALLOWED_KEYS: ${WEAVIATE_API_KEY:-WVF5YThaHlkYwhGUSmCRgsX3tD5ngdN8pkih}
      AUTHENTICATION_APIKEY_USERS: hello@dify.ai
      AUTHORIZATION_ADMINLIST_ENABLED: "true"
      AUTHORIZATION_ADMINLIST_USERS: hello@dify.ai
      PERSISTENCE_DATA_PATH: /var/lib/weaviate
      DEFAULT_VECTORIZER_MODULE: none
      CLUSTER_HOSTNAME: node1
    volumes:
      - ./volumes/weaviate:/var/lib/weaviate
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/v1/.well-known/ready 2>/dev/null || curl -sf http://localhost:8080/v1/.well-known/ready 2>/dev/null || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 15s
    networks:
      - agmind-backend

  # ==================== Qdrant (alternative vector store) ====================
  qdrant:
    <<: *security-defaults
    image: qdrant/qdrant:${QDRANT_VERSION:-v1.12.1}
    container_name: agmind-qdrant
    restart: always
    profiles:
      - qdrant
    environment:
      QDRANT__SERVICE__API_KEY: ${QDRANT_API_KEY:-}
    volumes:
      - ./volumes/qdrant:/qdrant/storage
    healthcheck:
      test: ["CMD-SHELL", "bash -c 'echo > /dev/tcp/127.0.0.1/6333' || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 15s
    networks:
      - agmind-backend

  # ==================== Docling (ETL service) ====================
  docling:
    <<: *security-defaults
    image: ghcr.io/docling-project/docling-serve:${DOCLING_SERVE_VERSION:-v1.14.3}
    container_name: agmind-docling
    restart: always
    profiles:
      - etl
    expose:
      - "8765"
    command: ["docling-serve", "run", "--port", "8765", "--host", "0.0.0.0"]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:8765/health')\" 2>/dev/null || curl -sf http://localhost:8765/health 2>/dev/null || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 30s
    networks:
      - agmind-backend

  # ==================== Xinference (Reranker) ====================
  xinference:
    <<: *security-defaults
    image: xprobe/xinference:${XINFERENCE_VERSION:-v0.16.3}
    container_name: agmind-xinference
    restart: always
    profiles:
      - etl
    expose:
      - "9997"
    command: ["xinference-local", "--host", "0.0.0.0", "--port", "9997"]
    volumes:
      - xinference_data:/root/.xinference
    #__GPU__deploy:
    #__GPU__  resources:
    #__GPU__    reservations:
    #__GPU__      devices:
    #__GPU__        - driver: nvidia
    #__GPU__          count: all
    #__GPU__          capabilities: [gpu]
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://localhost:9997/v1/models')\" 2>/dev/null || curl -sf http://localhost:9997/v1/models 2>/dev/null || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 30s
    networks:
      - agmind-backend

  # ==================== Sandbox (Code Execution) ====================
  # NOTE: sandbox does NOT inherit *security-defaults.
  # no-new-privileges:true blocks cap_add (SYS_ADMIN needed for sandbox namespaces).
  # cap_drop: ALL + cap_add is incompatible with sandbox's chroot/mount operations.
  sandbox:
    image: langgenius/dify-sandbox:${SANDBOX_VERSION:-0.2.12}
    container_name: agmind-sandbox
    restart: always
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "5"
    cap_add:
      - SETUID
      - SETGID
      - SYS_ADMIN
    environment:
      API_KEY: ${SANDBOX_API_KEY:-dify-sandbox}
      GIN_MODE: release
      WORKER_TIMEOUT: ${SANDBOX_WORKER_TIMEOUT:-15}
      ENABLE_NETWORK: ${SANDBOX_ENABLE_NETWORK:-true}
      HTTP_PROXY: ${SSRF_PROXY_HTTP_URL:-http://ssrf_proxy:3128}
      HTTPS_PROXY: ${SSRF_PROXY_HTTPS_URL:-http://ssrf_proxy:3128}
      SANDBOX_PORT: ${SANDBOX_PORT:-8194}
    volumes:
      - ./volumes/sandbox/conf:/conf:ro
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:8194/health 2>/dev/null || wget -qO- http://localhost:8194/health 2>/dev/null || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 10s
    networks:
      - ssrf-network

  # ==================== SSRF Proxy ====================
  ssrf_proxy:
    <<: *security-defaults
    image: ubuntu/squid:${SQUID_VERSION:-6.6-24.04_edge}
    container_name: agmind-ssrf-proxy
    restart: always
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_RAW
    volumes:
      - ./volumes/ssrf_proxy/squid.conf:/etc/squid/squid.conf:ro
    healthcheck:
      test: ["CMD-SHELL", "squid -k check 2>/dev/null || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 10s
    networks:
      - ssrf-network
      - agmind-backend

  # ==================== Plugin Daemon ====================
  plugin_daemon:
    <<: *security-defaults
    image: langgenius/dify-plugin-daemon:${PLUGIN_DAEMON_VERSION:-0.5.3-local}
    container_name: agmind-plugin-daemon
    restart: always
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    environment:
      # --- Database ---
      DB_USERNAME: ${DB_USERNAME:-postgres}
      DB_PASSWORD: ${DB_PASSWORD:-}
      DB_HOST: ${DB_HOST:-db}
      DB_PORT: ${DB_PORT:-5432}
      DB_DATABASE: ${PLUGIN_DB_DATABASE:-dify_plugin}
      DB_DEFAULT_DATABASE: ${DB_DATABASE:-dify}
      DB_SSL_MODE: ${DB_SSL_MODE:-disable}
      # --- Redis ---
      REDIS_HOST: ${REDIS_HOST:-redis}
      REDIS_PORT: ${REDIS_PORT:-6379}
      REDIS_PASSWORD: ${REDIS_PASSWORD:-}
      REDIS_DB: ${REDIS_DB:-0}
      REDIS_USE_SSL: ${REDIS_USE_SSL:-false}
      REDIS_USE_SENTINEL: ${REDIS_USE_SENTINEL:-false}
      REDIS_USE_CLUSTERS: ${REDIS_USE_CLUSTERS:-false}
      # --- Server ---
      SERVER_PORT: ${PLUGIN_DAEMON_PORT:-5002}
      SERVER_KEY: ${PLUGIN_DAEMON_KEY:-}
      PLATFORM: local
      # --- Dify API ---
      DIFY_INNER_API_KEY: ${PLUGIN_INNER_API_KEY:-}
      DIFY_INNER_API_URL: ${PLUGIN_DIFY_INNER_API_URL:-http://api:5001}
      DIFY_INVOCATION_CONNECTION_IDLE_TIMEOUT: ${DIFY_INVOCATION_CONNECTION_IDLE_TIMEOUT:-120}
      # --- Remote installing (plugin debug server) ---
      PLUGIN_REMOTE_INSTALLING_HOST: ${PLUGIN_DEBUGGING_HOST:-0.0.0.0}
      PLUGIN_REMOTE_INSTALLING_PORT: ${PLUGIN_DEBUGGING_PORT:-5003}
      # --- Plugin runtime ---
      PLUGIN_WORKING_PATH: ${PLUGIN_WORKING_PATH:-/app/storage/cwd}
      PLUGIN_INSTALLED_PATH: ${PLUGIN_INSTALLED_PATH:-plugin}
      PLUGIN_PACKAGE_CACHE_PATH: ${PLUGIN_PACKAGE_CACHE_PATH:-plugin_packages}
      PLUGIN_MEDIA_CACHE_PATH: ${PLUGIN_MEDIA_CACHE_PATH:-assets}
      PLUGIN_MAX_EXECUTION_TIMEOUT: ${PLUGIN_MAX_EXECUTION_TIMEOUT:-600}
      PLUGIN_LOCAL_LAUNCHING_CONCURRENT: ${PLUGIN_LOCAL_LAUNCHING_CONCURRENT:-10}
      PYTHON_ENV_INIT_TIMEOUT: ${PLUGIN_PYTHON_ENV_INIT_TIMEOUT:-120}
      PLUGIN_STDIO_BUFFER_SIZE: ${PLUGIN_STDIO_BUFFER_SIZE:-1024}
      PLUGIN_STDIO_MAX_BUFFER_SIZE: ${PLUGIN_STDIO_MAX_BUFFER_SIZE:-5242880}
      FORCE_VERIFYING_SIGNATURE: ${FORCE_VERIFYING_SIGNATURE:-true}
      PIP_MIRROR_URL: ${PIP_MIRROR_URL:-}
      # --- Storage ---
      PLUGIN_STORAGE_TYPE: ${PLUGIN_STORAGE_TYPE:-local}
      PLUGIN_STORAGE_LOCAL_ROOT: ${PLUGIN_STORAGE_LOCAL_ROOT:-/app/storage}
      MAX_PLUGIN_PACKAGE_SIZE: ${MAX_PLUGIN_PACKAGE_SIZE:-52428800}
      MAX_BUNDLE_PACKAGE_SIZE: ${MAX_BUNDLE_PACKAGE_SIZE:-52428800}
      # --- Pool / lifetime ---
      ROUTINE_POOL_SIZE: ${ROUTINE_POOL_SIZE:-100}
      LIFETIME_COLLECTION_HEARTBEAT_INTERVAL: ${LIFETIME_COLLECTION_HEARTBEAT_INTERVAL:-30}
      LIFETIME_COLLECTION_GC_INTERVAL: ${LIFETIME_COLLECTION_GC_INTERVAL:-60}
      LIFETIME_STATE_GC_INTERVAL: ${LIFETIME_STATE_GC_INTERVAL:-60}
      # --- Misc ---
      PPROF_ENABLED: ${PLUGIN_PPROF_ENABLED:-false}
      SENTRY_ENABLED: ${PLUGIN_SENTRY_ENABLED:-false}
      SENTRY_DSN: ${PLUGIN_SENTRY_DSN:-}
    volumes:
      - ./volumes/plugin_daemon/storage:/app/storage
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5002/health 2>/dev/null || wget -qO- http://localhost:5002/health 2>/dev/null || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 15s
    depends_on:
      db:
        condition: service_healthy
    networks:
      - agmind-backend

  # ==================== Nginx ====================
  nginx:
    <<: *security-defaults
    image: nginx:${NGINX_VERSION:-1.27.3-alpine}
    container_name: agmind-nginx
    restart: always
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
      - NET_BIND_SERVICE
    read_only: true
    tmpfs:
      - /tmp
      - /var/cache/nginx
      - /var/run
    ports:
      - "${EXPOSE_NGINX_PORT:-80}:80"
      - "${EXPOSE_NGINX_SSL_PORT:-443}:443"
    environment:
      NGINX_SERVER_NAME: ${NGINX_SERVER_NAME:-_}
      NGINX_HTTPS_ENABLED: ${NGINX_HTTPS_ENABLED:-false}
      NGINX_SSL_PORT: ${NGINX_SSL_PORT:-443}
      NGINX_PORT: ${NGINX_PORT:-80}
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./volumes/certbot/conf:/etc/letsencrypt:ro
      - ./volumes/certbot/www:/var/www/certbot:ro
      - ./volumes/certbot/ssl:/etc/nginx/ssl:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:80/ || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 10s
    depends_on:
      api:
        condition: service_healthy
      web:
        condition: service_healthy
      open-webui:
        condition: service_healthy
      pipeline:
        condition: service_healthy
    networks:
      - agmind-frontend
      - agmind-backend

  # ==================== Prometheus (monitoring profile) ====================
  prometheus:
    <<: *security-defaults
    image: prom/prometheus:${PROMETHEUS_VERSION:-v2.54.1}
    container_name: agmind-prometheus
    restart: always
    profiles:
      - monitoring
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/alert_rules.yml:/etc/prometheus/alert_rules.yml:ro
      - prometheus_data:/prometheus
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9090/-/healthy || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 15s
    networks:
      - agmind-backend

  # ==================== Alertmanager (monitoring profile) ====================
  alertmanager:
    <<: *security-defaults
    image: prom/alertmanager:${ALERTMANAGER_VERSION:-v0.27.0}
    container_name: agmind-alertmanager
    restart: always
    profiles:
      - monitoring
    volumes:
      - ./monitoring/alertmanager.yml:/etc/alertmanager/alertmanager.yml:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:9093/-/healthy || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 10s
    networks:
      - agmind-backend

  # ==================== Loki (monitoring profile) ====================
  loki:
    <<: *security-defaults
    image: grafana/loki:${LOKI_VERSION:-3.3.2}
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    container_name: agmind-loki
    profiles:
      - monitoring
    volumes:
      - loki_data:/loki
      - ./monitoring/loki-config.yml:/etc/loki/local-config.yaml:ro
    command: -config.file=/etc/loki/local-config.yaml
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3100/ready || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 15s
    networks:
      - agmind-backend
    restart: always

  # ==================== Promtail (monitoring profile) ====================
  promtail:
    <<: *security-defaults
    image: grafana/promtail:${PROMTAIL_VERSION:-3.3.2}
    container_name: agmind-promtail
    profiles:
      - monitoring
    volumes:
      - ./monitoring/promtail-config.yml:/etc/promtail/config.yml:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    command: -config.file=/etc/promtail/config.yml
    healthcheck:
      test: ["CMD-SHELL", "echo > /dev/tcp/127.0.0.1/9080 || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 15s
    depends_on:
      loki:
        condition: service_healthy
    networks:
      - agmind-backend
    restart: always

  # ==================== cAdvisor (monitoring profile) ====================
  cadvisor:
    <<: *security-defaults
    image: gcr.io/cadvisor/cadvisor:${CADVISOR_VERSION:-v0.49.1}
    container_name: agmind-cadvisor
    restart: always
    profiles:
      - monitoring
    expose:
      - "8080"
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:ro
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/healthz || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 15s
    networks:
      - agmind-backend

  # ==================== Grafana (monitoring profile) ====================
  grafana:
    <<: *security-defaults
    image: grafana/grafana:${GRAFANA_VERSION:-11.4.0}
    container_name: agmind-grafana
    restart: always
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    profiles:
      - monitoring
    ports:
      - "${GRAFANA_BIND_ADDR:-127.0.0.1}:${GRAFANA_PORT:-3001}:3000"
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
    volumes:
      - grafana_data:/var/lib/grafana
      - ./monitoring/grafana/provisioning:/etc/grafana/provisioning:ro
      - ./monitoring/grafana/dashboards:/var/lib/grafana/dashboards:ro
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/api/health || exit 1"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 15s
    depends_on:
      prometheus:
        condition: service_healthy
    networks:
      - agmind-frontend
      - agmind-backend

  # ==================== Portainer (monitoring profile) ====================
  portainer:
    <<: *security-defaults
    image: portainer/portainer-ce:${PORTAINER_VERSION:-2.21.4}
    container_name: agmind-portainer
    restart: always
    profiles:
      - monitoring
    ports:
      - "${PORTAINER_BIND_ADDR:-127.0.0.1}:${PORTAINER_PORT:-9443}:9443"
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - portainer_data:/data
    # portainer-ce is built on scratch — no shell, no wget, no curl.
    # In-container healthcheck is impossible. Use NONE and rely on restart policy.
    healthcheck:
      test: ["NONE"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 15s
    networks:
      - agmind-frontend
      - agmind-backend

  # ==================== Authelia (authelia profile) ====================
  authelia:
    <<: *security-defaults
    image: authelia/authelia:${AUTHELIA_VERSION:-4.38}
    container_name: agmind-authelia
    profiles: ["authelia"]
    restart: always
    volumes:
      - ./authelia:/config:ro
    environment:
      TZ: UTC
    healthcheck:
      test: ["CMD", "authelia", "healthcheck"]
      interval: ${HEALTHCHECK_INTERVAL:-30s}
      timeout: 10s
      retries: ${HEALTHCHECK_RETRIES:-5}
      start_period: 10s
    networks:
      - agmind-backend

  # ==================== Certbot (VPS profile only) ====================
  certbot:
    <<: *security-defaults
    image: certbot/certbot:${CERTBOT_VERSION:-v3.1.0}
    container_name: agmind-certbot
    restart: unless-stopped
    profiles:
      - vps
    volumes:
      - ./volumes/certbot/conf:/etc/letsencrypt
      - ./volumes/certbot/www:/var/www/certbot
    entrypoint: "/bin/sh -c 'trap exit TERM; while :; do certbot renew; sleep 12h & wait $${!}; done;'"
    networks:
      - agmind-backend

networks:
  agmind-frontend:
    driver: bridge
  agmind-backend:
    driver: bridge
    internal: true
  ssrf-network:
    driver: bridge
    internal: true

volumes:
  openwebui_data:
  ollama_data:
  xinference_data:
  grafana_data:
  portainer_data:
  prometheus_data:
  authelia_data:
  loki_data:
