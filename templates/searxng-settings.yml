# SearXNG settings for AGMind
# Ref: https://docs.searxng.org/admin/settings/settings.html

use_default_settings: true

general:
  instance_name: "AGMind Search"

search:
  safe_search: 0
  autocomplete: ""
  default_lang: "ru-RU"
  formats:
    - html
    - json

server:
  secret_key: "__SEARXNG_SECRET_KEY__"
  bind_address: "0.0.0.0"
  port: 8080
  limiter: false

engines:
  - name: google
    engine: google
    shortcut: g
    disabled: false
  - name: bing
    engine: bing
    shortcut: b
    disabled: false
  - name: duckduckgo
    engine: duckduckgo
    shortcut: ddg
    disabled: false
  - name: wikipedia
    engine: wikipedia
    shortcut: wp
    disabled: false
