# AGmind Worker Compose — dual-Spark peer node.
# Runs ONLY vLLM + node-exporter. Main stack (Dify, Postgres, Redis, etc.)
# lives on master. Deployed by master's phase_deploy_peer via scp+ssh.
#
# References:
#   VLLM_SPARK_IMAGE primary on DGX Spark (GB10 arm64 — see docs/adr/0001-arm64-only)
#   NVIDIA_DRIVER_CAPABILITIES=compute,utility mandatory (see docs/adr/0005-driver-580-hold);
#                  gpu_memory_utilization=0.60 safe default on Spark shared memory;
#                  mem_limit 96g unified memory budget for gemma-4-26B
#   image tags pinned (no :latest) + registry validation gate

x-logging: &logging-defaults
  logging:
    driver: "json-file"
    options:
      max-size: "10m"
      max-file: "3"

services:

  # ============================================================================
  # vLLM (OpenAI-compatible LLM server)
  # Exposes :8000 on peer host — master connects via http://${PEER_IP}:8000/v1/*
  # ============================================================================
  vllm:
    <<: *logging-defaults
    image: ${VLLM_IMAGE:-${VLLM_SPARK_IMAGE:-vllm/vllm-openai:gemma4-cu130}}
    container_name: agmind-vllm
    restart: unless-stopped
    mem_limit: ${VLLM_MEM_LIMIT:-96g}
    mem_swappiness: 0
    ipc: host
    # Docker embedded DNS (127.0.0.11) drops large DNS responses for
    # HF xet/LFS CDNs. Explicit resolvers prevent DNS timeout stalls during model
    # weight downloads (observed 2026-04-22 — 14 GB downloaded then stall).
    dns:
      - 1.1.1.1
      - 8.8.8.8
      - 192.168.1.1
    environment:
      - HUGGING_FACE_HUB_TOKEN=${HF_TOKEN:-}
      - CUDA_VISIBLE_DEVICES=${VLLM_CUDA_DEVICE:-0}
      # compute,utility required for NVML/CUDA to work on DGX Spark (see docs/adr/0005-driver-580-hold).
      # Without this env var, torch.cuda.is_available()=False and vLLM silently falls back to CPU.
      - NVIDIA_DRIVER_CAPABILITIES=${NVIDIA_DRIVER_CAPABILITIES:-compute,utility}
      - NVIDIA_VISIBLE_DEVICES=${NVIDIA_VISIBLE_DEVICES:-all}
      # Required when VLLM_MAX_MODEL_LEN > 1M (1M YaRN context, qwen36 opt-in).
      # Wizard sets VLLM_ALLOW_LONG_MAX_MODEL_LEN=1 when 1M ctx is chosen.
      - VLLM_ALLOW_LONG_MAX_MODEL_LEN=${VLLM_ALLOW_LONG_MAX_MODEL_LEN:-0}
      # vLLM args — entrypoint wrapper reads these and builds argv as a bash array
      # so JSON values (e.g. VLLM_SPECULATIVE_CONFIG) survive compose YAML rendering.
      # See templates/vllm-config/entrypoint.sh + LANDMINES.md
      # "vLLM CLI: --speculative-config is JSON, not path".
      - VLLM_MODEL=${VLLM_MODEL:-${VLLM_SPARK_MODEL:-google/gemma-4-26B-A4B-it}}
      - VLLM_GPU_MEM_UTIL=${VLLM_GPU_MEM_UTIL:-0.60}
      - VLLM_MAX_MODEL_LEN=${VLLM_MAX_MODEL_LEN:-65536}
      - VLLM_CMD_PREFIX=${VLLM_CMD_PREFIX:-}
      - VLLM_EXTRA_ARGS=${VLLM_EXTRA_ARGS:-}
      - VLLM_SPECULATIVE_CONFIG=${VLLM_SPECULATIVE_CONFIG:-}
      - VLLM_ROPE_SCALING_CONFIG=${VLLM_ROPE_SCALING_CONFIG:-}
    # Override image ENTRYPOINT (NGC nvidia_entrypoint.sh / AEON-7 CMD=[]) with
    # our bash wrapper which builds argv as an array — preserves quoted JSON
    # values that would otherwise be mangled by docker compose's shlex-split
    # on a folded `command:` scalar. See entrypoint.sh header for full rationale.
    entrypoint: ["/usr/local/bin/agmind-vllm-entrypoint.sh"]
    command: []
    volumes:
      - agmind_vllm_cache:/root/.cache/huggingface
      # vLLM argv wrapper — preserves JSON args through compose shlex.
      - ./vllm-config/entrypoint.sh:/usr/local/bin/agmind-vllm-entrypoint.sh:ro
    ulimits:
      memlock:
        soft: -1
        hard: -1
    ports:
      # Exposed directly on peer host — master connects via PEER_IP:8000
      - "8000:8000"
    healthcheck:
      test:
        - CMD
        - python3
        - -c
        - "import urllib.request; urllib.request.urlopen('http://localhost:8000/health')"
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 1800s
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              device_ids: ["${VLLM_CUDA_DEVICE:-0}"]
              capabilities: [gpu]

  # ============================================================================
  # portainer-agent — peer endpoint registered в master Portainer
  # Exposes :9001 on peer host. Master Portainer (на :9443) подключается через
  # shared AGENT_SECRET (lib/config.sh::_PORTAINER_AGENT_SECRET, persistent).
  # Auto-registered в master Portainer DB phase_deploy_peer'ом
  # (install.sh::_register_peer_portainer_endpoint).
  # ============================================================================
  portainer-agent:
    <<: *logging-defaults
    image: portainer/agent:${PORTAINER_AGENT_VERSION:-2.41.1}
    container_name: agmind-portainer-agent
    restart: unless-stopped
    # §8: каждый long-running контейнер ДОЛЖЕН иметь mem_limit (121 GiB unified
    # memory budget). Portainer agent typical RSS ~30-50 MB (Go binary, idle).
    # Хедрум ×5 на peak.
    mem_limit: ${PORTAINER_AGENT_MEM_LIMIT:-256m}
    environment:
      - AGENT_SECRET=${PORTAINER_AGENT_SECRET}
      - AGENT_PORT=9001
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /var/lib/docker/volumes:/var/lib/docker/volumes
    ports:
      - "9001:9001"

  # ============================================================================
  # node-exporter — host metrics for master's Prometheus scrape
  # Exposes :9100 on peer host (peer-node-exporter scrape job in Plan 02-05)
  # Note: no healthcheck — distroless image has no /bin/sh
  # Textfile collector: reads gpu_metrics.prom written by gpu-metrics.sh cron
  # on peer host — exposes agmind_gpu_* HW metrics for Grafana GPU — worker dashboard.
  # ============================================================================
  node-exporter:
    <<: *logging-defaults
    image: prom/node-exporter:${NODE_EXPORTER_VERSION:-v1.11.1}
    container_name: agmind-node-exporter
    restart: unless-stopped
    # §8: typical RSS ~10-30 MB. 128m headroom comfortable.
    mem_limit: ${NODE_EXPORTER_MEM_LIMIT:-128m}
    pid: host
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
      - '--path.rootfs=/host/root'
      - '--collector.filesystem.mount-points-exclude=^/(sys|proc|dev|host|etc)($$|/)'
      - '--collector.textfile.directory=/textfile'
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/host/root:ro,rslave
      - ./monitoring/textfile:/textfile:ro
    ports:
      - "9100:9100"

volumes:
  agmind_vllm_cache:
