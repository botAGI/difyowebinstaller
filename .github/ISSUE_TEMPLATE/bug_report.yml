name: "\U0001F41B Bug Report"
description: Something isn't working
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thanks for reporting! Please fill in as much as you can.

  - type: input
    id: version
    attributes:
      label: AGMind version
      description: "Run: agmind version"
      placeholder: "v2.1.0"
    validations:
      required: true

  - type: dropdown
    id: os
    attributes:
      label: Operating System
      options:
        - Ubuntu 22.04
        - Ubuntu 24.04
        - Debian 12
        - Other (specify below)
    validations:
      required: true

  - type: dropdown
    id: gpu
    attributes:
      label: GPU
      options:
        - NVIDIA (specify model below)
        - No GPU (CPU only)
    validations:
      required: true

  - type: textarea
    id: description
    attributes:
      label: What happened?
      description: Clear description of the bug
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to reproduce
      value: |
        1.
        2.
        3.
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Logs
      description: "Paste output of: agmind doctor"
      render: shell

  - type: textarea
    id: extra
    attributes:
      label: Additional context
