version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
      day: "monday"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
      - "github-actions"
    groups:
      security-updates:
        applies-to: security-updates
        patterns: ["*"]
      version-updates:
        applies-to: version-updates
        patterns: ["*"]
