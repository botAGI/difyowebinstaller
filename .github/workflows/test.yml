name: Tests

# Security baseline (CLAUDE.md §8 + 2026 Trivy/tj-actions/Nx supply chain attacks):
#  - All third-party actions pinned to full commit SHA (mutable tags = атакователь
#    force-push'ит зловред под тем же tag-ом, наш CI автоматом подтягивает).
#  - step-security/harden-runner с egress audit на каждом job — outbound network
#    policy + alert если action попытается слать данные на левый сервер.
#  - Renovate/Dependabot открывают auto-PR на bump SHA когда выходит новая stable.
#
# Format: ACTION@SHA  # vX.Y.Z (human-readable suffix — не используется runner'ом,
# только для review, чтобы видеть что-за-version pinned).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Bash syntax check (lib + scripts + tests)
        run: |
          errors=0
          for f in lib/*.sh scripts/*.sh install.sh tests/run_all.sh tests/unit/*.sh tests/integration/*.sh tests/compose/*.sh; do
            [[ -f "$f" ]] || continue
            if ! bash -n "$f"; then
              echo "FAIL: $f"
              errors=$((errors + 1))
            fi
          done
          exit $errors

  shellcheck:
    name: ShellCheck (warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: ShellCheck lib + scripts + install.sh
        run: shellcheck -S warning lib/*.sh scripts/*.sh install.sh
      - name: ShellCheck tests
        run: shellcheck -S warning tests/run_all.sh tests/unit/*.sh tests/integration/*.sh tests/mocks/* tests/compose/*.sh

  unit-tests:
    name: Unit Tests (with mocks)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run unit tests
        # default GHA shell is `bash -e {0}` (set -e on) — a test exiting 77 (SKIP)
        # would kill the whole step before our case handler runs. Disable -e.
        shell: bash --noprofile --norc {0}
        run: |
          set +e
          # rc=77 = SKIP (test self-disabled — missing optional dep, not-on-CI
          # resources like pipelines/ which is intentionally out of git, root, etc).
          # Same convention as tests/run_all.sh. Don't treat SKIP as FAIL.
          errors=0 passed=0 skipped=0
          for t in tests/unit/*.sh; do
            [[ -x "$t" ]] || chmod +x "$t"
            echo "==> $t"
            bash "$t"
            rc=$?
            case $rc in
              0)  passed=$((passed+1)) ;;
              77) echo "SKIP: $t (rc=77)"; skipped=$((skipped+1)) ;;
              *)  echo "FAIL: $t (rc=$rc)"; errors=$((errors+1)) ;;
            esac
          done
          echo "================================"
          echo "  PASS: ${passed}   SKIP: ${skipped}   FAIL: ${errors}"
          echo "================================"
          exit $errors

  image-tags:
    name: Image tag existence (registry check)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          # registries требуют outbound — audit, не block
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify all pinned image:tag exist in registry
        env:
          # CI runs on amd64 — пропускаем arm64 manifest gate, оставляем только
          # existence check. arm64 проверяем вручную при bump (см. CLAUDE.md §8).
          SKIP_PLATFORM_CHECK: "1"
        run: |
          bash tests/compose/test_image_tags_exist.sh templates/docker-compose.yml
          if [[ -f templates/docker-compose.worker.yml ]]; then
            bash tests/compose/test_image_tags_exist.sh templates/docker-compose.worker.yml
          fi

  manifest-consistency:
    name: Release manifest consistency
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate release-manifest.json ↔ versions.env consistency
        # Catches version drift between templates/versions.env, release-manifest.json,
        # RELEASE, install.sh VERSION. Empty digests = WARN (need docker for resolution),
        # tag mismatch / missing services / placeholder URLs = FAIL.
        run: python3 scripts/check-manifest-versions.py
      - name: Check install.sh VERSION == RELEASE == manifest.version
        run: |
          set +e
          rel="$(tr -d '[:space:]' < RELEASE)"
          inst="v$(grep -oE 'VERSION="[0-9.]+"' install.sh | head -1 | grep -oE '[0-9.]+')"
          man="$(python3 -c "import json; print(json.load(open('templates/release-manifest.json')).get('version',''))")"
          echo "RELEASE=$rel  install.sh=$inst  manifest=$man"
          if [[ "$rel" != "$inst" || "$rel" != "$man" ]]; then
            echo "::error::version drift — RELEASE/install.sh/manifest must all match"
            exit 1
          fi
          echo "✓ versions consistent"

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Trivy config scan
        # CRITICAL: до 2026-05-11 был @master — verified compromise window 2026-03-19
        # (75 of 77 tags force-pushed to credential-stealing malware). Now pinned to
        # full SHA; Dependabot/Renovate откроют PR с новым SHA когда выйдет stable.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
