name: Tests

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  bats:
    name: BATS Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install BATS
        run: |
          git clone --depth 1 https://github.com/bats-core/bats-core.git /tmp/bats
          sudo /tmp/bats/install.sh /usr/local
      - name: Run all BATS tests
        run: |
          bats tests/test_common.bats
          bats tests/test_detect.bats
          bats tests/test_wizard.bats
          bats tests/test_docker.bats
          bats tests/test_config.bats
          bats tests/test_compose.bats
          bats tests/test_compose_profiles.bats
          bats tests/test_health.bats
          bats tests/test_openwebui.bats
          bats tests/test_models.bats
          bats tests/test_security.bats
          bats tests/test_backup.bats
          bats tests/test_agmind_cli.bats
          bats tests/test_wizard_provider.bats
          bats tests/test_update.bats
          bats tests/test_manifest.bats
          bats tests/test_lifecycle.bats

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Run Trivy config scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
