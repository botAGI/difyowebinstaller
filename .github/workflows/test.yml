name: Tests

# Security baseline (supply-chain hardening + 2026 Trivy / tj-actions / Nx attacks):
#  - All third-party actions pinned to full commit SHA (mutable tags = атакователь
#    force-push'ит зловред под тем же tag-ом, наш CI автоматом подтягивает).
#  - step-security/harden-runner с egress audit на каждом job — outbound network
#    policy + alert если action попытается слать данные на левый сервер.
#  - Renovate/Dependabot открывают auto-PR на bump SHA когда выходит новая stable.
#
# Format: ACTION@SHA  # vX.Y.Z (human-readable suffix — не используется runner'ом,
# только для review, чтобы видеть что-за-version pinned).

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Bash syntax check (lib + scripts + tests)
        run: |
          errors=0
          for f in lib/*.sh scripts/*.sh install.sh tests/run_all.sh tests/unit/*.sh tests/lint/*.sh tests/integration/*.sh tests/compose/*.sh; do
            [[ -f "$f" ]] || continue
            if ! bash -n "$f"; then
              echo "FAIL: $f"
              errors=$((errors + 1))
            fi
          done
          exit $errors

  shellcheck:
    name: ShellCheck (warnings as errors)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: ShellCheck lib + scripts + install.sh
        run: shellcheck -S warning lib/*.sh scripts/*.sh install.sh
      - name: ShellCheck tests
        # tests/mocks/ contains executable bash mocks (no .sh extension) plus README.md (Plan 13-05).
        # find excludes the markdown documentation so shellcheck only sees bash sources.
        run: |
          shellcheck -S warning tests/run_all.sh tests/unit/*.sh tests/lint/*.sh tests/integration/*.sh tests/compose/*.sh $(find tests/mocks/ -maxdepth 1 -type f ! -name '*.md')

  unit-tests:
    name: Unit Tests (with mocks)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run unit tests
        # default GHA shell is `bash -e {0}` (set -e on) — a test exiting 77 (SKIP)
        # would kill the whole step before our case handler runs. Disable -e.
        shell: bash --noprofile --norc {0}
        run: |
          set +e
          # rc=77 = SKIP (test self-disabled — missing optional dep, not-on-CI
          # resources like pipelines/ which is intentionally out of git, root, etc).
          # Same convention as tests/run_all.sh. Don't treat SKIP as FAIL.
          errors=0 passed=0 skipped=0
          for t in tests/unit/*.sh tests/lint/*.sh; do
            [[ -e "$t" ]] || continue
            [[ -x "$t" ]] || chmod +x "$t"
            echo "==> $t"
            bash "$t"
            rc=$?
            case $rc in
              0)  passed=$((passed+1)) ;;
              77) echo "SKIP: $t (rc=77)"; skipped=$((skipped+1)) ;;
              *)  echo "FAIL: $t (rc=$rc)"; errors=$((errors+1)) ;;
            esac
          done
          echo "================================"
          echo "  PASS: ${passed}   SKIP: ${skipped}   FAIL: ${errors}"
          echo "================================"
          exit $errors

  unit-tests-arm64:
    # Native arm64 unit-test lane. AGmind targets DGX Spark (aarch64) exclusively
    # (x86_64 dropped 2026-04-25), so arm64 deserves a first-class CI lane next
    # to the default amd64 one. Same script as unit-tests; only the runner differs.
    # Not in branch-protection required checks yet — promote to required once it's
    # been green for a few runs.
    name: Unit Tests (arm64)
    runs-on: ubuntu-24.04-arm
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run unit tests (arm64)
        shell: bash --noprofile --norc {0}
        run: |
          set +e
          # rc=77 = SKIP (same convention as the amd64 lane and tests/run_all.sh)
          errors=0 passed=0 skipped=0
          for t in tests/unit/*.sh tests/lint/*.sh; do
            [[ -e "$t" ]] || continue
            [[ -x "$t" ]] || chmod +x "$t"
            echo "==> $t"
            bash "$t"
            rc=$?
            case $rc in
              0)  passed=$((passed+1)) ;;
              77) echo "SKIP: $t (rc=77)"; skipped=$((skipped+1)) ;;
              *)  echo "FAIL: $t (rc=$rc)"; errors=$((errors+1)) ;;
            esac
          done
          echo "================================"
          echo "  PASS: ${passed}   SKIP: ${skipped}   FAIL: ${errors}"
          echo "================================"
          exit $errors

  image-tags:
    name: Image tag existence (registry check)
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          # registries требуют outbound — audit, не block
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Verify all pinned image:tag exist in registry
        env:
          # CI runs on amd64 — пропускаем arm64 manifest gate, оставляем только
          # existence check. arm64 проверяем вручную при bump (см. docs/adr/0009-cadvisor-minio-arm64-holds.md).
          SKIP_PLATFORM_CHECK: "1"
        run: |
          bash tests/compose/test_image_tags_exist.sh templates/docker-compose.yml
          if [[ -f templates/docker-compose.worker.yml ]]; then
            bash tests/compose/test_image_tags_exist.sh templates/docker-compose.worker.yml
          fi

  manifest-consistency:
    name: Release manifest consistency
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Validate release-manifest.json ↔ versions.env consistency
        # Catches version drift between templates/versions.env, release-manifest.json,
        # RELEASE, install.sh VERSION. Empty digests = WARN (need docker for resolution),
        # tag mismatch / missing services / placeholder URLs = FAIL.
        run: python3 scripts/check-manifest-versions.py
      - name: Check install.sh VERSION == RELEASE == manifest.version
        run: |
          set +e
          rel="$(tr -d '[:space:]' < RELEASE)"
          # Accepts both literal  VERSION="3.0.2"  and override form  VERSION="${VERSION:-3.0.2}"
          inst="v$(sed -nE 's/^VERSION="(\$\{VERSION:-)?([0-9]+\.[0-9]+\.[0-9]+)\}?".*/\2/p' install.sh | head -1)"
          man="$(python3 -c "import json; print(json.load(open('templates/release-manifest.json')).get('version',''))")"
          echo "RELEASE=$rel  install.sh=$inst  manifest=$man"
          if [[ "$rel" != "$inst" || "$rel" != "$man" ]]; then
            echo "::error::version drift — RELEASE/install.sh/manifest must all match"
            exit 1
          fi
          echo "✓ versions consistent"

  trivy:
    name: Trivy Security Scan
    runs-on: ubuntu-latest
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
      - name: Run Trivy config scan
        # CRITICAL: до 2026-05-11 был @master — verified compromise window 2026-03-19
        # (75 of 77 tags force-pushed to credential-stealing malware). Now pinned to
        # full SHA; Dependabot/Renovate откроют PR с новым SHA когда выйдет stable.
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25 # v0.36.0
        with:
          scan-type: 'config'
          scan-ref: '.'
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  golden-tests:
    # Phase 13 TEST-10 — hermetic config-rendering equivalence per scenario.
    # Matrix runs 5 scenarios in parallel; fail-fast disabled so all diffs upload.
    # AGMIND_GOLDEN_ACCEPT explicit unset (D-14 — auto-update banned in CI env).
    # Path-filter NOT applied (D-21 + T-13-06-CI-SKIP-DRIFT mitigation).
    name: Golden tests (matrix)
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      # Scenario list mirrors tests/golden/scenarios.list (single source of truth).
      # When that file changes, update this matrix axis in the same commit.
      matrix:
        scenario: [minimal_lan, full_lan, rag_milvus, ragflow, cluster_peer]
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1 verified 2026-05-17
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 verified 2026-05-17

      - name: Install python3-yaml + shellcheck
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends shellcheck python3-yaml

      - name: Run golden scenario ${{ matrix.scenario }}
        # CLAUDE.md §8 — GHA default `bash -e {0}` would kill the step on rc=77
        # (SKIP — missing optional dep) before the case handler runs. Use
        # --noprofile --norc + explicit `set +e` to handle exit codes manually.
        shell: bash --noprofile --norc {0}
        env:
          SCENARIO: ${{ matrix.scenario }}
          CI: 'true'
        run: |
          set +e
          # Belt + suspenders (D-14): even if a malicious commit exports the var,
          # harness refuses to auto-accept under CI=true. Unset locally too.
          unset AGMIND_GOLDEN_ACCEPT
          bash tests/golden/run.sh "$SCENARIO"
          rc=$?
          case "$rc" in
            0)  echo "::notice::golden scenario $SCENARIO clean" ;;
            77) echo "::warning::golden scenario $SCENARIO SKIP (rc=77 — missing dep)"; rc=0 ;;
            *)  echo "::error::golden scenario $SCENARIO failed (rc=$rc)" ;;
          esac
          exit "$rc"

      - name: Upload diff artifact on failure
        # actions/upload-artifact@v5.0.0 — SHA reused from .github/workflows/scorecard.yml
        # (verified 2026-05-17 via `gh api repos/actions/upload-artifact/commits/<SHA>`).
        if: failure()
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0 verified 2026-05-17
        with:
          name: golden-diff-${{ matrix.scenario }}
          path: |
            tests/golden/.last-update.diff
            tests/golden/expected/${{ matrix.scenario }}/
          retention-days: 14
          if-no-files-found: warn

  golden-accept-reason-check:
    # Phase 13 D-15 / TEST-07 CI side: verify every commit in a PR that touches
    # tests/golden/expected/** carries a `golden-accept-reason: <reason>` trailer.
    # Regex identical to tests/golden/_commit_msg_guard.sh (Plan 13-04).
    name: Golden accept-reason trailer (PR commits)
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1 verified 2026-05-17
        with:
          egress-policy: audit
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2 verified 2026-05-17
        with:
          fetch-depth: 0
      - name: Check trailer on each commit touching tests/golden/expected/
        shell: bash --noprofile --norc {0}
        run: |
          set +e
          base="${{ github.event.pull_request.base.sha }}"
          head="${{ github.event.pull_request.head.sha }}"
          if [[ -z "$base" || -z "$head" ]]; then
            echo "::warning::base or head SHA missing — skipping trailer check"
            exit 0
          fi
          fail=0
          for sha in $(git rev-list "${base}..${head}"); do
            files="$(git diff-tree --no-commit-id --name-only -r "$sha")"
            if echo "$files" | grep -q '^tests/golden/expected/'; then
              msg="$(git log -1 --format=%B "$sha")"
              if ! echo "$msg" | grep -qE '^golden-accept-reason: [[:graph:]].{9,}'; then
                echo "::error::Commit $sha touches tests/golden/expected/** but commit message lacks 'golden-accept-reason: <reason ≥10 chars>' trailer"
                echo "  Commit subject: $(echo "$msg" | head -1)"
                fail=1
              else
                echo "::notice::Commit $sha has valid golden-accept-reason trailer"
              fi
            fi
          done
          exit "$fail"
