name: Lint

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install ShellCheck
        run: sudo apt-get install -y shellcheck
      - name: Run ShellCheck on all scripts
        run: |
          failed=0
          while IFS= read -r f; do
            echo "::group::Checking: $f"
            if ! shellcheck -S warning -e SC1091 -e SC2034 "$f"; then
              failed=$((failed + 1))
            fi
            echo "::endgroup::"
          done < <(find . -name "*.sh" -type f)
          if [ "$failed" -gt 0 ]; then
            echo "::error::ShellCheck failed on $failed file(s)"
            exit 1
          fi

  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install yamllint
        run: pip install yamllint
      - name: Run yamllint
        run: |
          yamllint -d "{extends: relaxed, rules: {line-length: {max: 200}, truthy: disable}}" \
            templates/docker-compose.yml \
            monitoring/prometheus.yml \
            monitoring/alertmanager.yml \
            monitoring/alert_rules.yml

  json-validate:
    name: JSON Validate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Validate JSON files
        run: |
          failed=0
          while IFS= read -r f; do
            echo "Validating: $f"
            if ! python3 -m json.tool "$f" > /dev/null; then
              failed=$((failed + 1))
            fi
          done < <(find . -name "*.json" -type f)
          if [ "$failed" -gt 0 ]; then
            echo "::error::JSON validation failed on $failed file(s)"
            exit 1
          fi

  bash-syntax:
    name: Bash Syntax Check
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Check bash -n on all scripts
        run: |
          failed=0
          while IFS= read -r f; do
            if ! bash -n "$f" 2>/dev/null; then
              echo "FAIL: $f"
              failed=$((failed + 1))
            else
              echo "OK: $f"
            fi
          done < <(find . -name "*.sh" -type f)
          if [ "$failed" -gt 0 ]; then
            echo "::error::Bash syntax check failed on $failed file(s)"
            exit 1
          fi
