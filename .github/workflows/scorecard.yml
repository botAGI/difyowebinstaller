# OpenSSF Scorecard — automatic security score 0-10 для open-source repo.
# Прогоняет 18 проверок: branch protection, signed commits, pinned actions,
# vuln disclosure policy, code review, maintained, dangerous workflows, etc.
#
# Результат публикуется в:
#   - GitHub Security tab → Code scanning alerts (через SARIF upload)
#   - https://securityscorecards.dev/viewer/?uri=github.com/botAGI/AGmind
#   - Badge на README.md (см. главную страницу)
#
# Баддж + публичный score = signal серьёзности проекта для растущей аудитории.
# Some companies require Scorecard ≥7 для adoption.
#
# Spec: https://github.com/ossf/scorecard

name: OpenSSF Scorecard

on:
  branch_protection_rule: {}      # триггерится при изменениях в branch protection
  schedule:
    - cron: '0 4 * * 1'           # weekly Monday 04:00 UTC
  push:
    branches: [main]

permissions: read-all

jobs:
  analysis:
    name: Scorecard analysis
    runs-on: ubuntu-latest
    permissions:
      security-events: write       # upload SARIF в Code Scanning
      id-token: write              # OIDC для signing publication
      contents: read
      actions: read
    steps:
      - uses: step-security/harden-runner@a5ad31d6a139d249332a2605b85202e8c0b78450 # v2.19.1
        with:
          egress-policy: audit

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Run Scorecard analysis
        uses: ossf/scorecard-action@4eaacf0543bb3f2c246792bd56e8cdeffafb205a # v2.4.3
        with:
          results_file: scorecard-results.sarif
          results_format: sarif
          # publish_results=true → результаты публикуются в OpenSSF API
          # для бейджа на securityscorecards.dev. Публичный signal для аудитории.
          publish_results: true

      - name: Upload artifact
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: scorecard-results
          path: scorecard-results.sarif
          retention-days: 5

      - name: Upload SARIF to Code Scanning
        uses: github/codeql-action/upload-sarif@fdbfb4d2750291e159f0156def62b853c2798ca2 # v4.31.5
        with:
          sarif_file: scorecard-results.sarif
