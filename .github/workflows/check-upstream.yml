name: Check Upstream Versions

on:
  schedule:
    - cron: '0 9 * * *'    # daily — all 32 components
  workflow_dispatch: {}     # manual trigger


permissions:
  contents: read
  issues: write

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Check upstream versions
        id: check
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: bash scripts/check-upstream.sh

      - name: Create daily version report issue
        uses: peter-evans/create-issue-from-file@v6
        with:
          title: "Upstream version report (${{ steps.check.outputs.date }})"
          content-filepath: /tmp/upstream-report.md
          labels: upstream-update
